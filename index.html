<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Commonword</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <h1 id="game-title">Commonword</h1>

      <section class="controls" aria-label="Game controls">
        <button id="revealToggle" class="primary icon-button" type="button" aria-pressed="false" aria-label="Show scoring cards">
          👁
        </button>
        <button id="newGame" type="button">New</button>
        <span class="toolbar-score" aria-live="polite">Score <strong id="score">0</strong></span>
      </section>

      <section class="board-wrap" aria-label="Emoji board">
        <div id="board" class="board"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
